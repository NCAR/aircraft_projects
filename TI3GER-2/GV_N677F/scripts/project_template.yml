# These variables are used to fill blanks in the dataset yaml files. Update them for each project.
variables:
  PROJECT: &project 'TI3GER-2'
  project: 'ti3ger-2'
  aircraft: gv  #must be c130 or gv
  year: '2026'  #project year

# Project specific fields to be added to dataset yaml files - project name will automatically be filled in using value above, so leave it as *project. Update the rest for each project.
fields:
  name: *project
  begin_date: '2026-04-21 00:00:00'
  end_date: '2026-05-22 23:59:59'
  minimum_latitude: '39.627'
  maximum_latitude: '39.92'
  minimum_longitude: '-123.787'
  maximum_longitude: '-105.087'

