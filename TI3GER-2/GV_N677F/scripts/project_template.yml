# DTS Specific Fields -- Update if data loader or checker changes
# If you are loading the data, put your dts contactID here. You can find it by
# logging in to the DTS and looking at the URL for your entry on the Add/Edit Users page
dts:
  internal_contact_id_dts: '368' #Jennifer Frame
  ingest_contact_id_dts: '368'
  ingest_status_id_dts: '2'
  load_contact_id_dts: '368'
  load_status_id_dts: '6'
  approve_contact_id_dts: '203' #Janine Aquino
  approve_status_id_dts: '6'
  author_id_dts: '368'
  note_type_id: '4'
  note_text: Loaded with new load_data_proj script

# CODIAC Specific Fields -- Update xlinks for every project. Update point of
# contact and internal contact if needed. To find your internal contact ID,
# login to data.eol.ucar.edu, switch to editor mode, go to Contact List, search
# for your name and find your id in the URL of your entry.
codiac:
  description: 'default'
  point_of_contact_id_codiac: 1  # NSF NCAR EOL - do not change
  internal_contact_id_codiac: 4649 #Jennifer Frame
  xlink_id: # Add projectwide xlinks to homepage, missions, data policy

# Standard fields that will be added to all dataset yaml files -- can be overridden within the yaml files
standard:
  is_eol_data: 1 ## Any data loaded by this script should be eol data --can be overridden by specific yaml files
  category_id: 2 ## 2 = Aircraft
  online_orderable: 1
  offline_orderable: 0
  browseable: 0
  dodsable: 0
  t_subset: 0
  event_subset: 1
  file_subset: 0
  order_allow_compress: 1
  readme_url: 'default'
  remote_url: 'default'
  description: 'default'

# Fields that will be added to yaml if dataset is preliminary (version_number < 1.0)
preliminary:
  visible: 0 # Load it as not visible until it is approved
  auth_reqd: 1
  eula_reqd: 1
  quality: 1

# Fields that will be added to yaml if dataset is final
final:
  visible: 0
  auth_reqd: 0
  eula_reqd: 0
  quality: 2

# ...Nothing to edit below here...
# Ingest fields that will be filled in by the replace_yaml script
paths: &paths
  raw_ingest_base: '/scr/raf/Raw_Data/<PROJECT>'
  prod_ingest_base: '/scr/raf/Prod_Data/<PROJECT>'
  field_ingest_base: '/scr/raf_data/<PROJECT>/field_data'
  
glade_paths:
  <<: *paths
  prod_archive_base: /glade/campaign/eol/archive/<year>/<project>/aircraft/<platform>
  field_archive_base: /glade/campaign/eol/archive/<year>/<project>/aircraft/<platform>/FIELD

localhost_paths:
  <<: *paths
  prod_archive_base: /net/archive/data/<project>/aircraft/<platform>
  field_archive_base: /net/archive/data/<project>/aircraft/<platform>/FIELD
