# VimbaX Camera Capture Configuration
# Three cameras: 2x Alvium G1-240c + 1x GT4907
#
# GigE bandwidth: ~100 MB/s practical
# Small cameras need ~3 MB/s each at 1 Hz, give them 15 MB/s headroom
# GT4907 needs 15.7 MB/frame, give it 70 MB/s for reliable transfer

# Camera 1 - Alvium G1-240c (2.4 MP)
#camID DEV_000A4732A1F9
#DIRECTION forward
#NIGHTTHRESHOLD 100
#BAYERMETHOD BILINEAR
#BANDWIDTH 40000000
#EXPOSUREAUTOMAX 100000
#JPG yes
#PNG no
#RAW no
#QUALITY 85

# Camera 2 - Alvium G1-240c (2.4 MP)
#camID DEV_000A47217BB3
#DIRECTION left
#NIGHTTHRESHOLD 100
#PIXELFORMAT BayerRG8
#BAYERMETHOD BILINEAR
#BANDWIDTH 40000000
#JPG yes
#PNG no
#RAW no
#QUALITY 80

